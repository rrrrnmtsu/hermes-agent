name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /root/hermes-agent
            git pull origin main
            source /root/.local/bin/env
            uv tool install --python python3.11 -e . --force
            systemctl is-active --quiet hermes && systemctl restart hermes || echo "hermes not running yet, skipping restart"
            echo "Deploy complete: $(hermes --version)"
